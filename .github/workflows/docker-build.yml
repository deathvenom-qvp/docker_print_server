# =============================================================================
# Docker Print Server - Build & Publish Image
# =============================================================================
#
# Builds the Docker image and pushes it to GitHub Container Registry (ghcr.io).
#
# Triggers:
#   - Push to main branch
#   - New version tags (v*)
#   - Pull requests (build only, no push)
#   - Manual dispatch
#
# Usage (pull the image):
#   docker pull ghcr.io/vertec-io/docker_print_server:latest
#
# =============================================================================

name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Set up Docker Buildx for multi-platform builds
      # -----------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------
      # Log in to GitHub Container Registry
      # (skipped for pull requests)
      # -----------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Extract metadata (tags, labels) for Docker
      # -----------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with "latest" on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with semver on version tags (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor on version tags (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with short SHA for traceability
            type=sha,prefix=

      # -----------------------------------------------------------------
      # Build and push Docker image
      # -----------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
