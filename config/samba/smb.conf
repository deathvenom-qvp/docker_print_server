# =============================================================================
# Samba Configuration for CUPS Print Server
# =============================================================================
#
# This configuration enables Windows clients to access CUPS printers via SMB.
# Authentication is REQUIRED - Windows 10/11 works out of the box.
#
# Default credentials:
#   Username: printuser (configurable via SAMBA_USER in docker-compose.yml)
#   Password: printers (configurable via SAMBA_PASSWORD in docker-compose.yml)
#
# Windows access: \\<server-ip>\printers
#
# =============================================================================

[global]
   workgroup = WORKGROUP
   server string = Docker Print Server
   
   # ==========================================================================
   # Security - User Authentication Required
   # ==========================================================================
   # Using 'user' security ensures Windows 10/11 compatibility without
   # requiring any client-side security policy changes.
   security = user
   passdb backend = tdbsam
   
   # Do NOT allow guest access - this ensures Windows compatibility
   map to guest = Never
   
   # ==========================================================================
   # Printing Configuration
   # ==========================================================================
   printing = CUPS
   printcap name = cups
   load printers = yes
   
   # ==========================================================================
   # SMB Protocol Settings
   # ==========================================================================
   # Modern protocol versions for Windows 10/11 compatibility
   # SMB1 is disabled by default in modern Windows - don't rely on it
   server min protocol = SMB2
   server max protocol = SMB3
   
   # NTLM authentication (required for some clients)
   ntlm auth = ntlmv2-only
   
   # ==========================================================================
   # Network Settings
   # ==========================================================================
   dns proxy = no
   
   # Bind to all interfaces (container environment)
   bind interfaces only = no
   
   # ==========================================================================
   # Logging
   # ==========================================================================
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   log level = 1
   
   # ==========================================================================
   # Performance
   # ==========================================================================
   socket options = TCP_NODELAY IPTOS_LOWDELAY

# =============================================================================
# Printers Share
# =============================================================================
[printers]
   comment = All Printers
   path = /var/spool/samba
   printable = yes
   browseable = yes
   
   # Require authentication (no guest access)
   guest ok = no
   
   # Valid users (configured via SAMBA_USER environment variable)
   # The start.sh script updates this at runtime
   valid users = printuser, root
   
   # Permissions
   create mask = 0700
   directory mask = 0700
   
   # Print-only (no file write)
   writable = no

# =============================================================================
# Print Drivers Share (Optional)
# =============================================================================
# Uncomment this section if you need to share printer drivers for
# automatic Windows driver installation (Point and Print)
# 
# [print$]
#    comment = Printer Drivers
#    path = /var/lib/samba/printers
#    browseable = yes
#    read only = yes
#    guest ok = no
#    valid users = printuser, root

