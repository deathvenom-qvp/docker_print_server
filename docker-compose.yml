# =============================================================================
# Docker Print Server - Docker Compose Configuration
# =============================================================================
#
# Services:
#   - CUPS:              Print server (http://localhost:631)
#   - Samba:             Windows SMB printer sharing (\\server\printers)
#   - wsdd:              Windows network discovery (WSD protocol)
#   - DirectPrintClient: Odoo integration (http://localhost:8888)
#
# Usage:
#   docker compose up -d --build    # Build locally and start
#   docker compose up -d            # Pull from GHCR and start
#   docker compose logs -f          # View logs
#   docker compose down             # Stop and remove
#   docker compose restart          # Restart services
#
# Macvlan Networking (container gets its own LAN IP):
#   docker compose -f docker-compose.macvlan.yml up -d
#   See docker-compose.macvlan.yml for details
#
# Configuration:
#   Edit the 'environment' section below to change settings
#   Or override via CLI: docker compose run -e VAR=value print-server
#
# =============================================================================

networks:
  printnet:
    name: printnet
    driver: bridge
    # =========================================================================
    # Alternative: Macvlan network (container gets its own LAN IP)
    # Use instead: docker compose -f docker-compose.macvlan.yml up -d
    # See docker-compose.macvlan.yml for macvlan setup with static IP
    # =========================================================================

services:
  print-server:
    image: ghcr.io/deathvenom-qvp/docker_print_server:latest
    build:
      context: .
      dockerfile: Dockerfile

    container_name: print-server
    hostname: print-server
    restart: unless-stopped

    environment:
      - CUPS_ADMIN_PASSWORD=adminpassword
      - SAMBA_PASSWORD=printers
      - SAMBA_USER=printuser
      - CUPS_SERVER_NAME=Print Server
      - TZ=UTC

    volumes:
      # =======================================================================
      # Persistent Data (named volumes)
      # =======================================================================
      # CUPS configuration, printer definitions, PPDs, and subscriptions
      # On first run Docker auto-populates this from the image defaults
      - cups-config:/etc/cups

      # Print queue spool
      - cups-spool:/var/spool/cups

      # =======================================================================
      # Optional: Override config files from host (uncomment if needed)
      # Only use these if you cloned the repo or created the files on the host.
      # The image already contains working defaults.
      # =======================================================================
      # - ./config/cups/cupsd.conf:/etc/cups/cupsd.conf:ro
      # - ./config/samba/smb.conf:/etc/samba/smb.conf:ro

    ports:
      # DirectPrintClient web interface (Odoo integration)
      - "8888:8888"

      # CUPS web interface and IPP
      - "631:631"

      # Samba NetBIOS Session
      # Note: On Windows hosts, use alternate ports (1139/1445) since Windows uses 139/445
      # On Linux/macOS hosts or production VMs, use standard ports (139/445)
      - "1139:139"

      # Samba SMB Direct (Windows file/printer sharing)
      - "1445:445"

      # wsdd WS-Discovery (Windows network discovery)
      - "3702:3702/udp"
      - "5357:5357"

      # Raw printing (JetDirect/AppSocket) - optional
      - "9100:9100"

    networks:
      - printnet

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # =========================================================================
    # USB Printer Support (Optional)
    # =========================================================================
    # Uncomment these lines to allow USB device access for USB-connected printers
    # Note: This requires the host to have USB devices passed through
    # privileged: true
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb

volumes:
  cups-config:
  cups-spool:
