

networks:
  printnet:  # Now managed by Docker Compose
    name: printnet  # Force the exact name to prevent prefixing
    driver: bridge  # Standard bridge network


services:
  directprintclient:
    build: ./direct_print
    container_name: directprintclient
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - printnet  # Attaches to printnet

  cups:
    image: olbat/cupsd
    container_name: cups
    restart: unless-stopped
    environment:
      - CUPS_USER_ADMIN=admin
      - CUPS_USER_PASSWORD=adminpassword
      - CUPS_WEBINTERFACE=yes

    volumes:
      - ./cups_data:/etc/cups
      - ./printers:/var/spool/cups
      - ./cups_data/cupsd.conf:/etc/cups/cupsd.conf
    ports:
      - "8631:631"  # External port 8631 -> container’s 631
    networks:
      - printnet  # Attaches to printnet

  samba:
    build: ./samba
    container_name: samba
    restart: unless-stopped
    environment:
      - USERNAME=printuser
      - PASSWORD=printpassword
    volumes:
      - ./printers:/printers
    ports:
      - "139:139"
      - "1445:445"
    networks:
      - printnet  # Attaches to printnet
