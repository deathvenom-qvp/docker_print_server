
services:
  directprintclient:
    build: ./direct_print
    container_name: directprintclient
    restart: unless-stopped
    ports:
      - "8888:8888"  # Adjust if your DirectPrintClient listens on a different port
    networks:
      - printnet

  cups:
    image: olbat/cupsd
    container_name: cups
    restart: unless-stopped
    environment:
      - CUPS_USER_ADMIN=admin
      - CUPS_USER_PASSWORD=adminpassword
    volumes:
      - ./cups_data:/etc/cups
      - ./printers:/var/spool/cups
    expose:
      - "631"    
    networks:
      - printnet

  nginx:
    image: nginx:latest
    container_name: cups-proxy
    depends_on:
      - cups
    ports:
      - "8631:8631"      # Host port -> Nginx listens on 8631
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - printnet

  samba:
    build: ./samba
    container_name: samba
    restart: unless-stopped
    environment:
      - USERNAME=printuser
      - PASSWORD=printpassword
    volumes:
      - ./printers:/printers  # Share the same printers folder used by CUPS
    ports:
      - "139:139"
      - "1445:445"  # Map external port 1445 to container port 445 (since Windows often reserves 445)

networks:
  printnet:
    driver: bridge